<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>вход или регистрация</title>
    <style>
     @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
       *{
           margin: 0;
           padding: 0;
           box-sizing:border-box;
           font-family: "Popins", sans-serif;
       }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('img/background.jpeg') no-repeat;
            background-size: cover;
            background-position: center
        }
       .wrapper{
           width: 420px;
           background: transparent;
           border: 2px solid rgb(255, 255, 255, .2);
           backdrop-filter: blur(20px);
           box-shadow: 0 0 10px rgba(0,0,0, .2);
           border-radius: 20px;
           padding: 30px 40px;
       }
        .wrapper h1 {
            font-size: 52px;
            text-align: center;
        }
        .wrapper .input-box {
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }
        .input-box input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            border: none;
            outline: none;
            border: 2px solid rgb(255, 255, 255, .2);
            border-radius: 40px;
            font-size: 16px;
            color: #fff;
            padding: 20px 45px 20px 20px
        }
        .input-box input::placeholder {
            color: white
        }
        .wrapper .remember {
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }
        .remember label input {
            accent-color: #fff;
            margin-right: 3px
        }
        .remember a {
            color: white;
            text-decoration:none
        }
        .remember a:hover {
            text-decoration: underline;
        }
        .wrapper .btn {
            width: 100%;
            height: 45px;
            background-color: #103133;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px #000000;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
        }
        .wrapper .register-link {
            font-size: 14.5px;
            text-align: center;
            margin-top: 20px;
        }
        .register-link p a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link p a:hover{
            text-decoration: underline;
            color: green;
        }
        .back p a {
            color: black;
            text-decoration: none;
            font-weight: 600; 
            font-size: 14.5px;
            text-align: center;
            margin-top: 20px;
        }
            .back p a:hover {
                color: white;
                text-decoration: underline;
            }
        .далее {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!--Вход или регистрация-->
    <div class="wrapper">
        <form action="">
            <h1>Вход</h1>
            <div class="input-box">
                <input type="text" placeholder="Имя" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Пароль" required>
            </div>
            <div class="remember">
                <label for=""> <input type="checkbox">Запомнить меня на этои устройстве</label>
                <a href="#">Забыл пароль?</a>
            </div>

            <button type="submit" class="btn"><a class="далее" href="page4.html">Войти</a></button>
            <p class="back"><a href="html on pc.html">назад</a></p>
            <div class="register-link">
                <p>Нет аккаунта? <a href="#">Зарегистрируйтесь</a></p>
            </div>


        </form>
    </div>
</body>
</html>
